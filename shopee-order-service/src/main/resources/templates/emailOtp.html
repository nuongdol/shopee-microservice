<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Send Otp for reset password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .button {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 20px;
        }
        .footer {
            font-size: 14px;
            color: #777;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: auto; padding:20px, border: 1px solid #eee; border-radius: 8px;">
        <h2 th:text="${subject}">Reset Your Password</h2>
        <p>Hello guy,</p>
        <p th:text="${message}">
            We received a request to reset your password. Please use the OTP below to continue.
        </p>
        <div style="font-size: 24px; font-weight: bold; margin: 20px 0; text-align: center;">
            <span th:text="${otp}">123456</span>
        </div>
        <p>This OTP will expire in <strong>5 minutes</strong>.</p>
        <p style="color: red;">
            Please do not share this OTP with anyone.
        </p>
        <hr/>
        <div style="font-size: 12px; color: #888; text-align: center;">
            <p>If you did not request this, please ignore this email.</p>
        </div>
    </div>
</div>
</body>
</html>
